<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#020617"/>
      <stop offset="50%"  stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <!-- Blue-purple glow for text -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Radial glow behind logo -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <!-- Wave bottom mask -->
    <clipPath id="wave-clip">
      <path d="M0 0 H900 V160 Q675 200 450 180 Q225 160 0 200 Z"/>
    </clipPath>

    <filter id="blur-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(148,163,184,0.07)"/>
  </pattern>
  <rect width="900" height="200" fill="url(#dots)"/>

  <!-- Soft glow behind center -->
  <ellipse cx="450" cy="100" rx="320" ry="90" fill="url(#glow)"/>

  <!-- Left bracket -->
  <text x="148" y="122" font-family="'Courier New', monospace" font-size="64" font-weight="300"
        fill="#60a5fa" opacity="0.9" filter="url(#blur-glow)">{</text>

  <!-- Name -->
  <text x="225" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700"
        letter-spacing="4" fill="url(#textGrad)" filter="url(#blur-glow)">Yogesh Solanki</text>

  <!-- Right bracket -->
  <text x="743" y="122" font-family="'Courier New', monospace" font-size="64" font-weight="300"
        fill="#a855f7" opacity="0.9" filter="url(#blur-glow)">}</text>

  <!-- Subtitle -->
  <text x="450" y="158" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="400"
        fill="#94a3b8" letter-spacing="3" text-anchor="middle" opacity="0.85">
    MOBILE &amp; WEB DEVELOPER · REACT NATIVE SPECIALIST
  </text>

  <!-- Decorative line under name -->
  <line x1="225" y1="132" x2="745" y2="132" stroke="url(#textGrad)" stroke-width="1.5" opacity="0.3"/>

  <!-- Small dots decoration -->
  <circle cx="210" cy="100" r="2.5" fill="#60a5fa" opacity="0.5"/>
  <circle cx="200" cy="100" r="1.5" fill="#60a5fa" opacity="0.3"/>
  <circle cx="760" cy="100" r="2.5" fill="#a855f7" opacity="0.5"/>
  <circle cx="770" cy="100" r="1.5" fill="#a855f7" opacity="0.3"/>
</svg>
